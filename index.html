<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roblox Avatar Studio (1080p)</title>
    <style>
        body { margin: 0; display: flex; background: #1e2128; color: #cbd5e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }
        #sidebar { width: 350px; background: #0f172a; padding: 20px; overflow-y: auto; height: 100%; box-sizing: border-box; flex-shrink: 0; }
        
        #viewer-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #111; padding: 20px; box-sizing: border-box; }
        #viewer { 
            width: 100%; max-width: 80vh; aspect-ratio: 1 / 1; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000;
        }
        #viewer canvas { width: 100% !important; height: 100% !important; } 

        textarea { width: 100%; height: 60px; background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px;}
        button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        button:hover { background: #2563eb; }
        
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px;}
        .control-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #94a3b8; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .row-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        .row-buttons button { margin: 0; background: #475569; }
        .row-buttons button.active { background: #3b82f6; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="color: white; margin-top: 0;">Roblox Avatar Studio</h3>
        
        <div class="control-group">
            <label>Input JSON Data</label>
            <textarea id="jsonInput" placeholder='[{"objUrl": "...", "mtlUrl": "..."}]'></textarea>
            <button onclick="loadModel()">Load Character</button>
        </div>

        <div class="control-group">
            <label>Background</label>
            <div class="row-buttons">
                <button id="btnTrans" class="active" onclick="setBackground('transparent')">Transparent</button>
                <button id="btnGreen" onclick="setBackground('green')">Green Screen</button>
            </div>
        </div>

        <div class="control-group">
            <label>Model Size (Scale) <span id="val_scale">100</span></label>
            <input type="range" id="model_scale" min="10" max="200" value="100" oninput="updateScale()">
        </div>

        <div class="control-group">
            <label>Camera Angle (자동 앵글)</label>
            <div class="row-buttons">
                <button onclick="setCameraAngle('front')">Front (정면)</button>
                <button onclick="setCameraAngle('right30')">Right 30° (우측 측면)</button>
            </div>
        </div>

        <div class="control-group" style="border-bottom: none;">
            <label>POSE CONTROL (포즈 조절)</label>
            <label style="font-weight: normal;">Right Arm (앞뒤) <span id="val_ra_x">0</span></label>
            <input type="range" id="ra_x" min="-180" max="180" value="0" oninput="updatePose()">
            <label style="font-weight: normal;">Right Arm (상하) <span id="val_ra_z">0</span></label>
            <input type="range" id="ra_z" min="-180" max="180" value="0" oninput="updatePose()">
            <label style="font-weight: normal;">Left Arm (앞뒤) <span id="val_la_x">0</span></label>
            <input type="range" id="la_x" min="-180" max="180" value="0" oninput="updatePose()">
            <label style="font-weight: normal;">Left Arm (상하) <span id="val_la_z">0</span></label>
            <input type="range" id="la_z" min="-180" max="180" value="0" oninput="updatePose()">
        </div>

        <button onclick="downloadPNG()" style="background: #10b981; margin-top: 10px; font-size: 16px;">⬇ Download PNG (1080p)</button>
    </div>

    <div id="viewer-container">
        <div id="viewer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, currentModel;
        const OUTPUT_SIZE = 1080; // 1080x1080 출력 고정
        const CAMERA_DIST = 12;   // 피사체와의 기본 거리
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ preserveDrawingBuffer: true, alpha: true, antialias: true });
            renderer.setSize(OUTPUT_SIZE, OUTPUT_SIZE);
            renderer.setPixelRatio(1); 
            renderer.setClearColor(0x000000, 0); 
            document.getElementById('viewer').appendChild(renderer.domElement);

            // 빛 설정 (자연스러운 피부색을 위해 조명 추가)
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 10);
            scene.add(dirLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 0, 0);

            setCameraAngle('front'); // 시작 시 정면 배치
            animate();
        }

        function loadModel() {
            try {
                const data = JSON.parse(document.getElementById('jsonInput').value)[0];
                if(currentModel) scene.remove(currentModel);

                const textureMap = {};
                data.textureUrls.forEach(url => {
                    const hash = url.split('/').pop();
                    textureMap[hash] = url;
                    textureMap[hash.replace('30DAY-', '')] = url;
                });

                const manager = new THREE.LoadingManager();
                manager.setURLModifier((url) => {
                    for (const key in textureMap) {
                        if (url.includes(key)) return textureMap[key];
                    }
                    return url;
                });

                const mtlLoader = new THREE.MTLLoader(manager);
                mtlLoader.setCrossOrigin('anonymous');
                mtlLoader.load(data.mtlUrl, (materials) => {
                    materials.preload();
                    
                    // ✨ 핵심 버그 픽스 구역: 로블록스 텍스처 렌더링 정상화
                    for (const key in materials.materials) {
                        const mat = materials.materials[key];
                        mat.transparent = true;       // 투명도 허용 (안경, 옷 파츠 등)
                        mat.depthWrite = true;        // ★중요: 뒤에 있는 물체가 앞으로 튀어나오는(유령) 현상 방지
                        mat.alphaTest = 0.1;          // 배경이 날아간 구멍을 제대로 파냄
                        mat.side = THREE.DoubleSide;  // 옷 안쪽이 투명해지는 현상 방지
                    }

                    const objLoader = new THREE.OBJLoader(manager);
                    objLoader.setMaterials(materials);
                    objLoader.load(data.objUrl, (object) => {
                        currentModel = object;

                        // 1. 모델을 중앙에 맞춤
                        const box = new THREE.Box3().setFromObject(object);
                        const centerY = (box.min.y + box.max.y) / 2;
                        object.position.set(0, -centerY, 0); 
                        
                        // 2. ★중요: 로블록스 모델은 기본적으로 뒤를 보고 있으므로 180도 돌려서 정면을 보게 함
                        object.rotation.y = Math.PI;

                        scene.add(object);
                        
                        // 로드 완료 후 리셋
                        resetSliders();
                        updateScale(); 
                        setCameraAngle('front'); 
                    });
                });
            } catch (e) {
                alert("JSON 로드 에러. 데이터를 확인하세요.");
            }
        }

        // 스케일 조절
        function updateScale() {
            if (!currentModel) return;
            const scaleVal = document.getElementById('model_scale').value / 100;
            currentModel.scale.set(scaleVal, scaleVal, scaleVal);
            document.getElementById('val_scale').innerText = document.getElementById('model_scale').value;
        }

        // 카메라 앵글 조절 (정면 / 우측 30도)
        function setCameraAngle(type) {
            if (type === 'front') {
                camera.position.set(0, 0, CAMERA_DIST);
            } else if (type === 'right30') {
                // 우측 30도는 카메라를 왼쪽으로 30도(-30도) 이동시켜야 피사체의 우측면이 보임
                const rad = -30 * Math.PI / 180; 
                camera.position.set(Math.sin(rad) * CAMERA_DIST, 0, Math.cos(rad) * CAMERA_DIST);
            }
            camera.lookAt(0, 0, 0);
            if (controls) controls.update();
        }

        // 포즈 조절 (팔 움직임 복구)
        function updatePose() {
            if (!currentModel) return;

            const ra_x = document.getElementById('ra_x').value * (Math.PI / 180);
            const ra_z = document.getElementById('ra_z').value * (Math.PI / 180);
            const la_x = document.getElementById('la_x').value * (Math.PI / 180);
            const la_z = document.getElementById('la_z').value * (Math.PI / 180);

            document.getElementById('val_ra_x').innerText = document.getElementById('ra_x').value + '°';
            document.getElementById('val_ra_z').innerText = document.getElementById('ra_z').value + '°';
            document.getElementById('val_la_x').innerText = document.getElementById('la_x').value + '°';
            document.getElementById('val_la_z').innerText = document.getElementById('la_z').value + '°';

            // 로블록스 부품 이름으로 뼈대 찾아서 회전 (전체가 180도 돌았으므로 축 방향이 다르게 느껴질 수 있음)
            const rightArm = currentModel.getObjectByName('RightArm') || currentModel.getObjectByName('RightUpperArm');
            const leftArm = currentModel.getObjectByName('LeftArm') || currentModel.getObjectByName('LeftUpperArm');

            if (rightArm) { rightArm.rotation.x = ra_x; rightArm.rotation.z = ra_z; }
            if (leftArm) { leftArm.rotation.x = la_x; leftArm.rotation.z = la_z; }
        }

        function resetSliders() {
            document.querySelectorAll('input[type="range"]').forEach(slider => {
                if(slider.id !== 'model_scale') slider.value = 0;
            });
            updatePose();
        }

        // 배경 전환
        function setBackground(type) {
            document.getElementById('btnTrans').className = type === 'transparent' ? 'active' : '';
            document.getElementById('btnGreen').className = type === 'green' ? 'active' : '';
            renderer.setClearColor(type === 'transparent' ? 0x000000 : 0x00ff00, type === 'transparent' ? 0 : 1);
        }

        // 1080x1080 이미지 다운로드
        function downloadPNG() {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = 'roblox_avatar_1080p.png';
            link.href = renderer.domElement.toDataURL("image/png");
            link.click();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
