<!DOCTYPE html>
<html>
<head>
    <title>Roblox Avatar Simple Renderer</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; }
        #viewer { width: 500px; height: 500px; background: #000; }
        textarea { width: 500px; height: 100px; margin: 10px; }
    </style>
</head>
<body>
    <h3>Paste JSON from n8n</h3>
    <textarea id="jsonInput" placeholder='Paste your JSON here...'></textarea>
    <button onclick="loadModel()">Render Model</button>
    <button onclick="saveImage()">Download PNG</button>
    <div id="viewer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script>
        let scene, camera, renderer, currentModel;
        
        // 씬 초기화
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ preserveDrawingBuffer: true, alpha: true });
        renderer.setSize(500, 500);
        document.getElementById('viewer').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        function loadModel() {
            const data = JSON.parse(document.getElementById('jsonInput').value)[0];
            
            const mtlLoader = new THREE.MTLLoader();
            mtlLoader.load(data.mtlUrl, (materials) => {
                materials.preload();
                const objLoader = new THREE.OBJLoader();
                objLoader.setMaterials(materials);
                objLoader.load(data.objUrl, (object) => {
                    if(currentModel) scene.remove(currentModel);
                    currentModel = object;
                    scene.add(object);
                    
                    camera.position.set(data.camera.position.x, data.camera.position.y, data.camera.position.z);
                    camera.lookAt(0, 100, 0); // 모델 중심 바라보기
                    renderer.render(scene, camera);
                });
            });
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'avatar.png';
            link.href = renderer.domElement.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
