<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roblox Avatar Studio (Face Fixed)</title>
    <style>
        body { margin: 0; display: flex; background: #1e2128; color: #cbd5e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }
        #sidebar { width: 350px; background: #0f172a; padding: 20px; overflow-y: auto; height: 100%; box-sizing: border-box; flex-shrink: 0; }
        #viewer-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #111; padding: 20px; box-sizing: border-box; }
        #viewer { width: 100%; max-width: 80vh; aspect-ratio: 1 / 1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; }
        #viewer canvas { width: 100% !important; height: 100% !important; } 

        textarea, input[type="text"] { width: 100%; background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px;}
        textarea { height: 60px; }
        button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        button:hover { background: #2563eb; }
        
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px;}
        .control-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #94a3b8; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .row-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        .row-buttons button { margin: 0; background: #475569; }
        .row-buttons button.active { background: #3b82f6; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="color: white; margin-top: 0;">Roblox Avatar Studio</h3>
        
        <div class="control-group">
            <label>1. Input JSON Data (몸통)</label>
            <textarea id="jsonInput" placeholder='[{"objUrl": "...", "mtlUrl": "..."}]'></textarea>
            <button onclick="loadModel()">Load Character</button>
        </div>

        <div class="control-group">
            <label>2. Face Texture URL (누락된 얼굴 복구)</label>
            <!-- 테스트를 위해 로블록스 기본 스마일 얼굴 URL을 기본값으로 넣었습니다 -->
            <input type="text" id="faceUrl" value="https://tr.rbxcdn.com/38c3749746e5ba2b10a21069b2d86f7b/420/420/Decal/Png" placeholder="얼굴 이미지 URL 입력">
            <button onclick="applyFace()" style="background: #f59e0b;">Apply Face</button>
        </div>

        <div class="control-group">
            <label>Background</label>
            <div class="row-buttons">
                <button id="btnTrans" class="active" onclick="setBackground('transparent')">Transparent</button>
                <button id="btnGreen" onclick="setBackground('green')">Green Screen</button>
            </div>
        </div>

        <div class="control-group">
            <label>Camera Angle (앵글 조절)</label>
            <div class="row-buttons">
                <button onclick="setCameraAngle('front')">Front (정면)</button>
                <button onclick="setCameraAngle('right30')">Right 30°</button>
            </div>
        </div>

        <div class="control-group" style="border-bottom: none;">
            <label>POSE CONTROL</label>
            <label style="font-weight: normal;">Right Arm (상하) <span id="val_ra_z">0</span></label>
            <input type="range" id="ra_z" min="-180" max="180" value="0" oninput="updatePose()">
            <label style="font-weight: normal;">Right Arm (앞뒤) <span id="val_ra_x">0</span></label>
            <input type="range" id="ra_x" min="-180" max="180" value="0" oninput="updatePose()">
            <label style="font-weight: normal;">Left Arm (상하) <span id="val_la_z">0</span></label>
            <input type="range" id="la_z" min="-180" max="180" value="0" oninput="updatePose()">
            <label style="font-weight: normal;">Left Arm (앞뒤) <span id="val_la_x">0</span></label>
            <input type="range" id="la_x" min="-180" max="180" value="0" oninput="updatePose()">
        </div>

        <button onclick="downloadPNG()" style="background: #10b981; margin-top: 10px; font-size: 16px;">⬇ Download PNG (1080p)</button>
    </div>

    <div id="viewer-container">
        <div id="viewer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, currentModel;
        const OUTPUT_SIZE = 1080; 
        
        function getRobloxCdnUrl(hash) {
            let i = 31;
            for (let t = 0; t < hash.length; t++) i ^= hash.charCodeAt(t);
            return `https://t${i % 8}.rbxcdn.com/${hash}`;
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ preserveDrawingBuffer: true, alpha: true, antialias: true });
            renderer.setSize(OUTPUT_SIZE, OUTPUT_SIZE);
            renderer.setClearColor(0x000000, 0); 
            document.getElementById('viewer').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 10);
            scene.add(dirLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 0, 0);
            animate();
        }

        function loadModel() {
            try {
                const data = JSON.parse(document.getElementById('jsonInput').value)[0];
                if(currentModel) scene.remove(currentModel);

                const textureMap = {};
                data.textureUrls.forEach(url => {
                    const hash = url.split('/').pop();
                    textureMap[hash] = url;
                    textureMap[hash.replace('30DAY-', '')] = url;
                });

                const manager = new THREE.LoadingManager();
                manager.setURLModifier((url) => {
                    if (url.includes('rbxcdn.com')) {
                        const hash = url.split('/').pop(); 
                        return getRobloxCdnUrl(hash);      
                    }
                    return url;
                });

                const mtlLoader = new THREE.MTLLoader(manager);
                mtlLoader.setCrossOrigin('anonymous');
                mtlLoader.load(data.mtlUrl, (materials) => {
                    materials.preload();
                    
                    for (const key in materials.materials) {
                        const mat = materials.materials[key];
                        mat.transparent = false; 
                        mat.alphaTest = 0.5;     
                        mat.color.setHex(0xffffff); 
                    }

                    const objLoader = new THREE.OBJLoader(manager);
                    objLoader.setMaterials(materials);
                    objLoader.load(data.objUrl, (object) => {
                        currentModel = object;
                        const box = new THREE.Box3().setFromObject(object);
                        const centerY = (box.min.y + box.max.y) / 2;
                        object.position.set(0, -centerY, 0); 
                        object.rotation.y = Math.PI;
                        scene.add(object);
                        
                        setCameraAngle('front'); 
                        
                        // 모델 로드 직후 1초 뒤 자동으로 얼굴 텍스처 입히기 시도
                        setTimeout(applyFace, 500); 
                    });
                });
            } catch (e) { alert("JSON 로드 에러."); }
        }

        // 🌟 [핵심] 누락된 얼굴 텍스처를 찾아 강제로 입혀주는 마법의 함수 🌟
        function applyFace() {
            if (!currentModel) return;
            const faceUrl = document.getElementById('faceUrl').value;
            if (!faceUrl) return;

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');
            texLoader.load(faceUrl, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                
                // 모델의 모든 부품(Mesh)을 뒤져서 '얼굴(Head)' 파츠를 찾아냅니다.
                currentModel.traverse((child) => {
                    if (child.isMesh) {
                        const mats = Array.isArray(child.material) ? child.material : [child.material];
                        mats.forEach(mat => {
                            // 로블록스 OBJ 구조상, 텍스처 맵(map)이 없는 살색 파츠가 머리일 확률이 99%입니다.
                            if (!mat.map || mat.name.toLowerCase().includes('head')) {
                                mat.map = texture;
                                mat.transparent = true;
                                mat.alphaTest = 0.5;
                                mat.needsUpdate = true;
                            }
                        });
                    }
                });
            }, undefined, function (error) {
                console.error("얼굴 텍스처 로드 실패 (CORS 문제일 수 있음):", error);
            });
        }

        function setCameraAngle(type) {
            if (!currentModel) return;
            const box = new THREE.Box3().setFromObject(currentModel);
            const dist = Math.max(box.getSize(new THREE.Vector3()).y, 5) * 1.5;

            if (type === 'front') camera.position.set(0, 0, dist);
            else if (type === 'right30') camera.position.set(Math.sin(-30 * Math.PI / 180) * dist, 0, Math.cos(-30 * Math.PI / 180) * dist);
            
            camera.lookAt(0, 0, 0);
            if (controls) controls.update();
        }

        function updatePose() {
            if (!currentModel) return;
            const r = id => document.getElementById(id).value * (Math.PI / 180);
            
            const rightArm = currentModel.getObjectByName('RightArm') || currentModel.getObjectByName('RightUpperArm');
            const leftArm = currentModel.getObjectByName('LeftArm') || currentModel.getObjectByName('LeftUpperArm');

            if (rightArm) { rightArm.rotation.x = -r('ra_x'); rightArm.rotation.z = -r('ra_z'); }
            if (leftArm) { leftArm.rotation.x = -r('la_x'); leftArm.rotation.z = r('la_z'); }
        }

        function setBackground(type) {
            document.getElementById('btnTrans').className = type === 'transparent' ? 'active' : '';
            document.getElementById('btnGreen').className = type === 'green' ? 'active' : '';
            renderer.setClearColor(type === 'transparent' ? 0x000000 : 0x00ff00, type === 'transparent' ? 0 : 1);
        }

        function downloadPNG() {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = 'roblox_avatar_1080p.png';
            link.href = renderer.domElement.toDataURL("image/png");
            link.click();
        }

        function animate() { requestAnimationFrame(animate); if(controls) controls.update(); renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
