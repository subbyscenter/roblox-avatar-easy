<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roblox Avatar Studio (Automation Ready)</title>
    <style>
        body { margin: 0; display: flex; background: transparent; overflow: hidden; height: 100vh; }
        /* 자동화 모드일 때 사이드바 숨김 처리 가능 */
        #sidebar { width: 350px; background: #0f172a; padding: 20px; overflow-y: auto; height: 100%; box-sizing: border-box; flex-shrink: 0; }
        #viewer-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        #viewer { width: 100%; max-width: 80vh; aspect-ratio: 1 / 1; background: transparent; }
        #viewer canvas { width: 100% !important; height: 100% !important; } 

        textarea { width: 100%; height: 60px; background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px;}
        button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px;}
        .control-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #94a3b8; font-weight: bold; }
        .row-buttons { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
        .row-buttons button { flex: 1; margin: 0; background: #475569; padding: 8px 5px; font-size: 12px; }
        .row-buttons button.active { background: #3b82f6; }
    </style>
</head>
<body>

    <div id="sidebar" class="ui-panel">
        <h3 style="color: white; margin-top: 0;">Roblox Avatar Studio</h3>
        <div class="control-group"><textarea id="jsonInput"></textarea><button onclick="loadModel()">Load</button></div>
    </div>

    <div id="viewer-container"><div id="viewer"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>

    <script>
        let scene, camera, renderer, currentModel;
        let OUTPUT_SIZE = 1080; 
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ preserveDrawingBuffer: true, alpha: true, antialias: true });
            renderer.setSize(OUTPUT_SIZE, OUTPUT_SIZE);
            renderer.setPixelRatio(1); 
            renderer.setClearColor(0x000000, 0); 
            document.getElementById('viewer').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 10);
            scene.add(dirLight);

            animate();
            checkAutoRun(); // 🌟 자동화 실행 체크
        }

        function loadModel(autoAngle = 'front', autoScale = 100) {
            try {
                const inputText = document.getElementById('jsonInput').value;
                const rawData = JSON.parse(inputText);
                
                function findModelData(node) {
                    if (!node || typeof node !== 'object') return null;
                    if (node.objUrl && node.mtlUrl) return node; 
                    for (const key in node) {
                        const found = findModelData(node[key]);
                        if (found) return found;
                    }
                    return null;
                }
                const data = findModelData(rawData);
                if(currentModel) scene.remove(currentModel);

                const textureMap = {};
                if (data.textureMap) {
                    Object.assign(textureMap, data.textureMap);
                } else if (data.textureUrls) {
                    data.textureUrls.forEach(url => {
                        const hash = url.split('/').pop(); 
                        const pureHash = hash.replace('30DAY-', '').replace('7DAY-', ''); 
                        textureMap[hash] = url; textureMap[pureHash] = url; 
                    });
                }

                const manager = new THREE.LoadingManager();
                manager.setURLModifier((url) => {
                    for (const key in textureMap) { if (url.includes(key)) return textureMap[key]; }
                    return url; 
                });

                const mtlLoader = new THREE.MTLLoader(manager);
                mtlLoader.setCrossOrigin('anonymous');
                mtlLoader.load(data.mtlUrl, (materials) => {
                    materials.preload();
                    for (const key in materials.materials) {
                        const mat = materials.materials[key];
                        mat.transparent = mat.map ? true : false;
                        mat.alphaTest = 0.5; mat.alphaMap = null; mat.depthWrite = true; mat.side = THREE.DoubleSide; mat.color.setHex(0xffffff); 
                    }

                    const objLoader = new THREE.OBJLoader(manager);
                    objLoader.setMaterials(materials);
                    objLoader.load(data.objUrl, (object) => {
                        const box = new THREE.Box3().setFromObject(object);
                        const center = box.getCenter(new THREE.Vector3());
                        object.position.set(-center.x, -center.y, -center.z);
                        object.rotation.y = Math.PI;

                        currentModel = new THREE.Group();
                        currentModel.add(object);
                        scene.add(currentModel);
                        
                        camera.userData.baseDist = Math.max(box.getSize(new THREE.Vector3()).x, box.getSize(new THREE.Vector3()).y) * 1.5;

                        // 자동화 파라미터 적용
                        const s = autoScale / 100;
                        currentModel.scale.set(s, s, s);

                        if (autoAngle === 'front') {
                            camera.position.set(0, 0, camera.userData.baseDist);
                        } else {
                            const rad = -parseInt(autoAngle) * Math.PI / 180; 
                            camera.position.set(Math.sin(rad) * camera.userData.baseDist, 0, Math.cos(rad) * camera.userData.baseDist);
                        }
                        camera.lookAt(0, 0, 0);

                        // 🌟 n8n(Puppeteer)에게 렌더링 완료를 알리는 신호 생성
                        setTimeout(() => {
                            const readyDiv = document.createElement('div');
                            readyDiv.id = 'render-complete';
                            document.body.appendChild(readyDiv);
                        }, 1000); // 텍스처 입혀질 시간 1초 대기
                    });
                });
            } catch (e) { console.error(e); }
        }

        // 🌟 URL 파라미터를 읽어서 자동 실행하는 함수
        function checkAutoRun() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('data')) {
                document.querySelector('.ui-panel').style.display = 'none'; // 스크린샷 방해 안되게 UI 숨김
                
                // 파라미터 읽기
                const jsonData = decodeURIComponent(params.get('data'));
                const angle = params.get('angle') || 'front';
                const scale = params.get('scale') || 100;
                const res = params.get('res') || 1080;
                
                // 설정 적용
                OUTPUT_SIZE = parseInt(res);
                renderer.setSize(OUTPUT_SIZE, OUTPUT_SIZE);
                document.getElementById('jsonInput').value = jsonData;
                
                // 렌더링 시작
                loadModel(angle, scale);
            }
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
