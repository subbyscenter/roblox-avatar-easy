<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roblox Avatar Studio (Batch Fixed & n8n Ready)</title>
    <style>
        body { margin: 0; display: flex; background: #1e2128; color: #cbd5e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }
        #sidebar { width: 350px; background: #0f172a; padding: 20px; overflow-y: auto; height: 100%; box-sizing: border-box; flex-shrink: 0; }
        #viewer-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #111; padding: 20px; box-sizing: border-box; position: relative; }
        #viewer { width: 100%; max-width: 80vh; aspect-ratio: 1 / 1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: transparent; }
        #viewer canvas { width: 100% !important; height: 100% !important; } 

        textarea { width: 100%; height: 150px; background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px;}
        button { width: 100%; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        
        .btn-load { background: #3b82f6; } .btn-load:hover { background: #2563eb; }
        .btn-batch { background: #8b5cf6; margin-top: 10px;} .btn-batch:hover { background: #7c3aed; }
        .btn-dl { background: #10b981; } .btn-dl:hover { background: #059669; }

        .control-group { margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 15px;}
        .control-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #94a3b8; font-weight: bold; }
        
        .row-buttons { display: flex; gap: 5px; margin-bottom: 5px; }
        .row-buttons button { flex: 1; margin: 0; background: #475569; padding: 8px 5px; font-size: 12px; }
        .row-buttons button.active { background: #3b82f6; }

        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="color: white; margin-top: 0;">Roblox Avatar Studio</h3>
        
        <div class="control-group">
            <label>Input JSON Data</label>
            <textarea id="jsonInput" placeholder='JSON 데이터를 입력하세요'></textarea>
            <button class="btn-load" onclick="loadPreview()">단일 Preview (미리보기)</button>
            <button class="btn-batch" onclick="startBatchProcess()">Batch Output (ZIP 다운로드)</button>
        </div>

        <div class="control-group">
            <label>Background (Preview용)</label>
            <div class="row-buttons">
                <button id="btnTrans" class="active" onclick="setBackground('transparent')">Transparent</button>
                <button id="btnGreen" onclick="setBackground('green')">Green Screen</button>
            </div>
        </div>

        <div class="control-group">
            <label>Model Size (Preview용)</label>
            <div class="row-buttons">
                <button id="btnScale100" class="active" onclick="setScale(100)">100%</button>
                <button id="btnScale75" onclick="setScale(75)">75%</button>
                <button id="btnScale50" onclick="setScale(50)">50%</button>
            </div>
        </div>

        <div class="control-group">
            <label>Camera Angle (Preview용)</label>
            <div class="row-buttons">
                <button id="btnAngle0" class="active" onclick="setCameraAngle(0)">Front (0°)</button>
                <button id="btnAngle30" onclick="setCameraAngle(30)">30°</button>
                <button id="btnAngle45" onclick="setCameraAngle(45)">45°</button>
                <button id="btnAngle60" onclick="setCameraAngle(60)">60°</button>
            </div>
        </div>

        <button class="btn-dl" onclick="downloadPNG()">⬇ 현재 화면 다운로드</button>
    </div>

    <div id="viewer-container">
        <div id="overlay">
            <div class="spinner"></div>
            <h2 id="progressText">Processing...</h2>
        </div>
        <div id="viewer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- ZIP 생성 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        let scene, camera, renderer, controls, currentModel;
        let OUTPUT_SIZE = 1080; 
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ preserveDrawingBuffer: true, alpha: true, antialias: true });
            renderer.setSize(OUTPUT_SIZE, OUTPUT_SIZE);
            renderer.setPixelRatio(1); 
            renderer.setClearColor(0x000000, 0); 
            document.getElementById('viewer').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 10);
            scene.add(dirLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 0, 0);

            animate();
        }

        // 🌟 누락된 텍스처 투명 처리 및 렌더링 최적화 🌟
        function loadModelAsync(charData) {
            return new Promise((resolve, reject) => {
                try {
                    const textureMap = {};
                    if (charData.textureUrls) {
                        charData.textureUrls.forEach(url => {
                            const hash = url.split('/').pop(); 
                            const pureHash = hash.replace('30DAY-', '').replace('7DAY-', ''); 
                            textureMap[hash] = url; 
                            textureMap[pureHash] = url; 
                        });
                    }

                    // 1x1 투명 픽셀 이미지 (Base64) - JSON에 없는 텍스처를 투명하게 날려버림
                    const emptyTexture = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

                    const manager = new THREE.LoadingManager();
                    manager.setURLModifier((url) => {
                        // 1. obj 또는 mtl 파일 자체는 변환하지 않고 그대로 통과시킵니다. (오류 방지 핵심)
                        if (url === charData.objUrl || url === charData.mtlUrl) {
                            return url;
                        }

                        // 2. JSON (textureUrls)에 존재하는 텍스처면 해당 링크 반환
                        for (const key in textureMap) { 
                            if (url.includes(key)) return textureMap[key]; 
                        }

                        // 3. 기본 얼굴용 로프록시 링크나, 이미 Base64로 변환된 데이터는 통과
                        if (url.includes('tr.roproxy.com') || url.startsWith('data:')) {
                            return url;
                        }

                        // 4. 그 외(배열에서 삭제된 목걸이 텍스처 등)는 '투명 픽셀'로 강제 교체
                        return emptyTexture; 
                    });

                    // 타임아웃 셋팅 (10초 동안 로드가 안되면 강제로 실패 처리하여 무한로딩 방지)
                    const timeoutId = setTimeout(() => { reject(new Error("Model Load Timeout")); }, 10000);

                    const mtlLoader = new THREE.MTLLoader(manager);
                    mtlLoader.setCrossOrigin('anonymous');
                    
                    mtlLoader.load(charData.mtlUrl, (materials) => {
                        materials.preload();
                        for (const key in materials.materials) {
                            const mat = materials.materials[key];
                            // 투명 픽셀이 정상적으로 투명하게 보이도록 무조건 transparent를 true로 설정
                            mat.transparent = true; 
                            mat.alphaTest = 0.5; 
                            mat.alphaMap = null; 
                            mat.depthWrite = true; 
                            mat.side = THREE.DoubleSide; 
                            mat.color.setHex(0xffffff); 
                        }

                        const objLoader = new THREE.OBJLoader(manager);
                        objLoader.setMaterials(materials);
                        
                        objLoader.load(charData.objUrl, (object) => {
                            clearTimeout(timeoutId); // 타임아웃 해제

                            const box = new THREE.Box3().setFromObject(object);
                            const center = box.getCenter(new THREE.Vector3());
                            
                            object.position.set(-center.x, -center.y, -center.z);
                            object.rotation.y = Math.PI;

                            const group = new THREE.Group();
                            group.add(object);
                            
                            const size = box.getSize(new THREE.Vector3());
                            const baseDist = Math.max(size.x, size.y, size.z) * 1.5;

                            // 안전한 기본 얼굴 입히기
                            const texLoader = new THREE.TextureLoader();
                            texLoader.setCrossOrigin('anonymous');
                            texLoader.load('https://tr.roproxy.com/38c3749746e5ba2b10a21069b2d86f7b/420/420/Decal/Png', (tex) => {
                                tex.colorSpace = THREE.SRGBColorSpace;
                                object.traverse((child) => {
                                    if (child.isMesh) {
                                        const mats = Array.isArray(child.material) ? child.material : [child.material];
                                        mats.forEach(mat => {
                                            if (mat.name.toLowerCase().includes('head') && (!mat.map || (mat.map.image && mat.map.image.width <= 8))) {
                                                mat.map = tex; mat.transparent = true; mat.alphaTest = 0.5; mat.color.setHex(0xffffff); mat.needsUpdate = true;
                                            }
                                        });
                                    }
                                });
                                // 0.5초 대기 후 resolve (렌더링 안정화 시간)
                                setTimeout(() => { resolve({ model: group, baseDist: baseDist }); }, 500);
                            }, undefined, () => {
                                // 텍스처 로딩 실패해도 멈추지 않고 넘어감
                                setTimeout(() => { resolve({ model: group, baseDist: baseDist }); }, 500);
                            });
                        }, undefined, (err) => { clearTimeout(timeoutId); reject(err); });
                    }, undefined, (err) => { clearTimeout(timeoutId); reject(err); });
                } catch(e) { reject(e); }
            });
        }

        // 🌟 [UI 전용] Batch 모드 완벽 제어 🌟
        async function startBatchProcess() {
            const rawData = getParsedJSON();
            if (!rawData) return;

            if (!rawData.characters || !rawData.render_settings) {
                alert("Batch 설정(render_settings)이 포함된 JSON이 아닙니다.\n단일 Preview 버튼을 사용해주세요.");
                return;
            }

            const settings = rawData.render_settings;
            const res = parseInt(settings.resolution) || 1080;
            renderer.setSize(res, res);

            if (settings.background.toLowerCase() === 'transparent') {
                renderer.setClearColor(0x000000, 0);
            } else {
                renderer.setClearColor(0x00ff00, 1);
            }

            document.getElementById('overlay').style.display = 'flex';
            const zip = new JSZip();

            try {
                for (let i = 0; i < rawData.characters.length; i++) {
                    const char = rawData.characters[i];
                    document.getElementById('progressText').innerText = `Processing: ${char.ID_Name} (${i+1}/${rawData.characters.length})`;

                    if(currentModel) scene.remove(currentModel);
                    
                    const loadedData = await loadModelAsync(char);
                    currentModel = loadedData.model;
                    camera.userData.baseDist = loadedData.baseDist;
                    scene.add(currentModel);

                    const scaleVal = parseInt(settings.scale) / 100;
                    currentModel.scale.set(scaleVal, scaleVal, scaleVal);

                    // 렌더링 딜레이 최적화
                    for (let angle of settings.angles) {
                        setCameraAngle(angle);
                        
                        // 화면이 다시 그려질 때까지 0.3초 여유
                        await new Promise(r => setTimeout(r, 300)); 
                        renderer.render(scene, camera);

                        const imgData = renderer.domElement.toDataURL("image/png").replace(/^data:image\/(png|jpg);base64,/, "");
                        zip.file(`${char.ID_Name}_${angle}.png`, imgData, {base64: true});
                    }
                }

                document.getElementById('progressText').innerText = "Zipping files...";
                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, "Roblox_Avatars_Batch.zip");
                alert("Batch 작업이 성공적으로 완료되었습니다!");

            } catch (e) {
                alert("Batch 처리 중 에러가 발생하여 중단되었습니다.");
                console.error(e);
            } finally {
                document.getElementById('overlay').style.display = 'none';
            }
        }

        // 🌟 [UI 전용] Preview 모드 단일 캐릭터용 🌟
        function loadPreview() {
            const rawData = getParsedJSON();
            if (!rawData) return;

            const charData = (rawData.characters && rawData.characters.length > 0) ? rawData.characters[0] : rawData;
            
            if (!charData.objUrl || !charData.mtlUrl) {
                alert("올바른 캐릭터 모델 데이터(objUrl, mtlUrl)가 없습니다.");
                return;
            }

            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('progressText').innerText = "Loading Preview...";

            if(currentModel) scene.remove(currentModel);
            
            loadModelAsync(charData).then(loadedData => {
                currentModel = loadedData.model;
                camera.userData.baseDist = loadedData.baseDist;
                scene.add(currentModel);
                
                setScale(100);
                setCameraAngle(0);
                document.getElementById('overlay').style.display = 'none';
            }).catch(err => {
                console.error(err);
                alert("모델을 불러오는데 실패했습니다.");
                document.getElementById('overlay').style.display = 'none';
            });
        }

        function getParsedJSON() {
            const txt = document.getElementById('jsonInput').value.trim();
            if (!txt) { alert("JSON 데이터를 입력해주세요."); return null; }
            try {
                let parsed = JSON.parse(txt);
                if (Array.isArray(parsed) && parsed.length > 0) return parsed[0];
                return parsed;
            } catch(e) {
                alert("JSON 형식이 잘못되었습니다.");
                return null;
            }
        }

        // --- Camera & View Controls ---
        function setScale(percent) {
            [100, 75, 50].forEach(val => { document.getElementById('btnScale' + val).className = (val === percent) ? 'active' : ''; });
            if (!currentModel) return;
            const s = percent / 100;
            currentModel.scale.set(s, s, s); 
        }

        function setCameraAngle(angle) {
            [0, 30, 45, 60].forEach(val => { 
                const btn = document.getElementById('btnAngle' + val);
                if(btn) btn.className = (val === angle) ? 'active' : ''; 
            });
            if (!currentModel || !camera.userData.baseDist) return;
            const dist = camera.userData.baseDist;
            const rad = -angle * Math.PI / 180; 
            camera.position.set(Math.sin(rad) * dist, 0, Math.cos(rad) * dist);
            camera.lookAt(0, 0, 0);
            if (controls) controls.update();
        }

        function setBackground(type) {
            document.getElementById('btnTrans').className = type === 'transparent' ? 'active' : '';
            document.getElementById('btnGreen').className = type === 'green' ? 'active' : '';
            renderer.setClearColor(type === 'transparent' ? 0x000000 : 0x00ff00, type === 'transparent' ? 0 : 1);
        }

        function downloadPNG() {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = `roblox_avatar_preview.png`;
            link.href = renderer.domElement.toDataURL("image/png");
            link.click();
        }

        function animate() { requestAnimationFrame(animate); if(controls) controls.update(); renderer.render(scene, camera); }


        // 🌟 ======================================================== 🌟
        // 🌟 [n8n Puppeteer 전용 Headless API] - UI 없이 자동 렌더링 후 Base64 반환
        // 🌟 ======================================================== 🌟
        window.renderForPuppeteer = async function(rawData) {
            // n8n 데이터가 배열 형태로 넘어올 경우 처리
            if (Array.isArray(rawData)) rawData = rawData[0];

            if (!rawData || !rawData.characters || !rawData.render_settings) {
                throw new Error("Invalid JSON data format. 'characters' and 'render_settings' are required.");
            }

            const settings = rawData.render_settings;
            
            // 해상도 세팅 ("1080p" 같은 문자열에서 숫자만 추출)
            const res = parseInt(String(settings.resolution).replace(/[^0-9]/g, '')) || 1080;
            renderer.setSize(res, res);

            // 배경 세팅
            if (settings.background && settings.background.toLowerCase() === 'transparent') {
                renderer.setClearColor(0x000000, 0);
            } else {
                renderer.setClearColor(0x00ff00, 1);
            }

            const results = []; // 생성된 이미지들을 담을 배열

            for (let i = 0; i < rawData.characters.length; i++) {
                const char = rawData.characters[i];
                
                if (currentModel) scene.remove(currentModel);

                try {
                    // 모델 비동기 로드 대기
                    const loadedData = await loadModelAsync(char);
                    currentModel = loadedData.model;
                    camera.userData.baseDist = loadedData.baseDist;
                    scene.add(currentModel);

                    // 스케일 설정 ("100%" -> 숫자 변환)
                    const scaleVal = parseInt(String(settings.scale).replace(/[^0-9]/g, '')) / 100 || 1;
                    currentModel.scale.set(scaleVal, scaleVal, scaleVal);

                    // 앵글별 렌더링
                    const angles = settings.angles || [0];
                    for (let angle of angles) {
                        setCameraAngle(angle);
                        
                        // 모델이 화면에 안착하고 GPU가 렌더링을 끝낼 수 있도록 0.8초 넉넉히 대기
                        await new Promise(r => setTimeout(r, 800)); 
                        renderer.render(scene, camera);

                        // 캔버스 데이터를 Base64로 추출 (n8n으로 전달하기 위해 접두사 제거)
                        const base64Data = renderer.domElement.toDataURL("image/png").replace(/^data:image\/(png|jpg);base64,/, "");

                        results.push({
                            fileName: `${char.ID_Name}_${angle}.png`,
                            base64: base64Data
                        });
                    }
                } catch (e) {
                    console.error(`Error processing ${char.ID_Name}:`, e);
                    // 한 모델이 에러나더라도 멈추지 않고 다음 모델로 진행
                }
            }
            
            // Puppeteer에게 최종 결과 배열 Return
            return results; 
        };

        // 초기화 실행
        init();
    </script>
</body>
</html>
