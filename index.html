<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roblox Avatar Studio (Simple & Stable)</title>
    <style>
        body { margin: 0; display: flex; background: #1e2128; color: #cbd5e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }
        #sidebar { width: 350px; background: #0f172a; padding: 20px; overflow-y: auto; height: 100%; box-sizing: border-box; flex-shrink: 0; }
        #viewer-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #111; padding: 20px; box-sizing: border-box; }
        #viewer { width: 100%; max-width: 80vh; aspect-ratio: 1 / 1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; }
        #viewer canvas { width: 100% !important; height: 100% !important; } 

        textarea { width: 100%; height: 60px; background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px;}
        button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        button:hover { background: #2563eb; }
        
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 15px;}
        .control-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #94a3b8; font-weight: bold; }
        
        .row-buttons { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
        .row-buttons button { flex: 1; margin: 0; background: #475569; padding: 8px 5px; font-size: 12px; }
        .row-buttons button.active { background: #3b82f6; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="color: white; margin-top: 0;">Roblox Avatar Studio</h3>
        
        <div class="control-group">
            <label>Input JSON Data</label>
            <textarea id="jsonInput" placeholder='[{"objUrl": "...", "mtlUrl": "..."}]'></textarea>
            <button onclick="loadModel()">Load Character</button>
        </div>

        <div class="control-group">
            <label>Background</label>
            <div class="row-buttons">
                <button id="btnTrans" class="active" onclick="setBackground('transparent')">Transparent</button>
                <button id="btnGreen" onclick="setBackground('green')">Green Screen</button>
            </div>
        </div>

        <div class="control-group">
            <label>Model Size (Scale)</label>
            <div class="row-buttons">
                <button id="btnScale100" class="active" onclick="setScale(100)">100%</button>
                <button id="btnScale75" onclick="setScale(75)">75%</button>
                <button id="btnScale50" onclick="setScale(50)">50%</button>
                <button id="btnScale25" onclick="setScale(25)">25%</button>
            </div>
        </div>

        <div class="control-group">
            <label>Camera Angle</label>
            <div class="row-buttons">
                <button id="btnAngleFront" class="active" onclick="setCameraAngle('front')">Front</button>
                <button id="btnAngle30" onclick="setCameraAngle(30)">R 30°</button>
                <button id="btnAngle45" onclick="setCameraAngle(45)">R 45°</button>
                <button id="btnAngle60" onclick="setCameraAngle(60)">R 60°</button>
            </div>
        </div>

        <div class="control-group" style="border-bottom: none;">
            <label>Output Resolution</label>
            <div class="row-buttons">
                <button id="btnRes1080" class="active" onclick="setResolution(1080)">1080p</button>
                <button id="btnRes720" onclick="setResolution(720)">720p</button>
                <button id="btnRes540" onclick="setResolution(540)">540p</button>
            </div>
        </div>

        <button id="btnDownload" onclick="downloadPNG()" style="background: #10b981; margin-top: 5px; font-size: 16px;">⬇ Download PNG (1080p)</button>
    </div>

    <div id="viewer-container">
        <div id="viewer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, currentModel;
        let OUTPUT_SIZE = 1080; 
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ preserveDrawingBuffer: true, alpha: true, antialias: true });
            renderer.setSize(OUTPUT_SIZE, OUTPUT_SIZE);
            renderer.setPixelRatio(1); 
            renderer.setClearColor(0x000000, 0); 
            document.getElementById('viewer').appendChild(renderer.domElement);

            // 빛 셋업
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 10);
            scene.add(dirLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 0, 0);

            animate();
        }

        function loadModel() {
            try {
                const data = JSON.parse(document.getElementById('jsonInput').value)[0];
                if(currentModel) scene.remove(currentModel);

                const textureMap = {};
                data.textureUrls.forEach(url => {
                    const hash = url.split('/').pop(); 
                    const pureHash = hash.replace('30DAY-', '').replace('7DAY-', ''); 
                    textureMap[hash] = url;
                    textureMap[pureHash] = url; 
                });

                const manager = new THREE.LoadingManager();
                manager.setURLModifier((url) => {
                    for (const key in textureMap) {
                        if (url.includes(key)) return textureMap[key];
                    }
                    return url; 
                });

                const mtlLoader = new THREE.MTLLoader(manager);
                mtlLoader.setCrossOrigin('anonymous');
                mtlLoader.load(data.mtlUrl, (materials) => {
                    materials.preload();
                    
                    for (const key in materials.materials) {
                        const mat = materials.materials[key];
                        if (mat.map) {
                            mat.transparent = true;
                            mat.alphaTest = 0.5; 
                        } else {
                            mat.transparent = false; 
                        }
                        mat.alphaMap = null; 
                        mat.depthWrite = true; 
                        mat.side = THREE.DoubleSide; 
                        mat.color.setHex(0xffffff); 
                    }

                    const objLoader = new THREE.OBJLoader(manager);
                    objLoader.setMaterials(materials);
                    objLoader.load(data.objUrl, (object) => {
                        
                        // 🌟 중앙 정렬 및 스케일 버그 해결 로직 🌟
                        const box = new THREE.Box3().setFromObject(object);
                        const center = box.getCenter(new THREE.Vector3());
                        
                        // 1. 오브젝트를 완벽히 0,0,0 좌표의 중심으로 이동
                        object.position.set(-center.x, -center.y, -center.z);
                        object.rotation.y = Math.PI;

                        // 2. 오브젝트를 투명한 그룹(Wrapper)으로 감싸기 (스케일 조절 시 제자리에 있게 함)
                        currentModel = new THREE.Group();
                        currentModel.add(object);
                        scene.add(currentModel);
                        
                        // 카메라 기본 거리를 모델 사이즈에 비례하여 저장해둠
                        const size = box.getSize(new THREE.Vector3());
                        camera.userData.baseDist = Math.max(size.x, size.y, size.z) * 1.5;

                        // 로드 완료 시 기본값 세팅
                        setScale(100);
                        setCameraAngle('front'); 
                    });
                });
            } catch (e) {
                alert("JSON 로드 중 에러가 발생했습니다.");
                console.error(e);
            }
        }

        // --- 기능 제어 함수들 ---

        function setScale(percent) {
            // UI 버튼 갱신
            [100, 75, 50, 25].forEach(val => {
                document.getElementById('btnScale' + val).className = (val === percent) ? 'active' : '';
            });

            if (!currentModel) return;
            const s = percent / 100;
            currentModel.scale.set(s, s, s); // 그룹(Wrapper)의 스케일을 줄이므로 제자리에서 작아짐
        }

        function setCameraAngle(angle) {
            // UI 버튼 갱신
            ['front', 30, 45, 60].forEach(val => {
                const btnId = val === 'front' ? 'btnAngleFront' : 'btnAngle' + val;
                document.getElementById(btnId).className = (val === angle) ? 'active' : '';
            });

            if (!currentModel || !camera.userData.baseDist) return;
            const dist = camera.userData.baseDist;

            if (angle === 'front') {
                camera.position.set(0, 0, dist);
            } else {
                const rad = -angle * Math.PI / 180; // 우측 측면이 보이게 카메라를 좌측으로 이동
                camera.position.set(Math.sin(rad) * dist, 0, Math.cos(rad) * dist);
            }
            camera.lookAt(0, 0, 0);
            if (controls) controls.update();
        }

        function setResolution(res) {
            OUTPUT_SIZE = res;
            
            // UI 버튼 갱신
            [1080, 720, 540].forEach(val => {
                document.getElementById('btnRes' + val).className = (val === res) ? 'active' : '';
            });

            // 내부 렌더러 사이즈 변경 (화면 비율은 CSS로 고정되어 있으므로 출력본 해상도만 바뀜)
            renderer.setSize(OUTPUT_SIZE, OUTPUT_SIZE);
            document.getElementById('btnDownload').innerText = `⬇ Download PNG (${res}p)`;
        }

        function setBackground(type) {
            document.getElementById('btnTrans').className = type === 'transparent' ? 'active' : '';
            document.getElementById('btnGreen').className = type === 'green' ? 'active' : '';
            renderer.setClearColor(type === 'transparent' ? 0x000000 : 0x00ff00, type === 'transparent' ? 0 : 1);
        }

        function downloadPNG() {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = `roblox_avatar_${OUTPUT_SIZE}p.png`;
            link.href = renderer.domElement.toDataURL("image/png");
            link.click();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
